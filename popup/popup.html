<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>IELTS Web Reader</title>
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      display: inline-block;
    }
    .dot.ok { background: #10b981; }
    .dot.err { background: #ef4444; }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-top: 1px solid #f3f4f6;
    }
    .row:first-of-type { border-top: none; }
    .label { color: #6b7280; }
    .value { color: #111827; font-weight: 500; }
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #f3f4f6;
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 6px 0;
      background: #1f2937;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #374151; }
  </style>
</head>
<body>
  <h1><span class="dot" id="status-dot"></span> IELTS Web Reader</h1>
  <div class="row"><span class="label">后端</span><span class="value" id="backend-status">检查中…</span></div>
  <div class="row"><span class="label">词库</span><span class="value" id="vocab-count">—</span></div>
  <div class="row"><span class="label">模式</span><span class="value" id="mode">仅 3000+ 重点词</span></div>
  <button id="check-btn">重新检查</button>
  <div class="footer">
    数据源：ielts-must-pass 后端 (8100)<br>
    3000 基础词不会翻译 / 入库
  </div>
  <script src="popup.js"></script>
</body>
</html>
